<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alıntı</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1410;
      font-family: 'Lora', Georgia, serif;
      padding: 2rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .card img { width: 100%; display: block; }
    .quote-box {
      background: #1a1410;
      padding: 1.6rem 1.8rem 1.8rem;
      border-top: 3px solid #c9a84c;
      position: relative;
    }
    .quote-box::before {
      content: '\201C';
      position: absolute;
      top: -0.2rem;
      left: 1.2rem;
      font-size: 4rem;
      color: #c9a84c;
      font-family: 'Playfair Display', serif;
      line-height: 1;
    }
    .quote-text {
      color: #f0e8d5;
      font-size: 1rem;
      line-height: 1.75;
      font-style: italic;
      text-align: center;
      padding-top: 0.5rem;
      letter-spacing: 0.01em;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #c9a84c;
      margin: 1rem auto 0;
      opacity: 0.6;
    }
  </style>
</head>
